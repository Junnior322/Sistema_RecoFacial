<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSJB — Control de Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --rojo:#dc2626;--verde:#16a34a;
  --blanco:#ffffff;--gris:#f5f6f8;--gris2:#e8eaed;
  --texto:#1a1d23;--texto3:#7a8090;
  --font:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;font-family:var(--font);background:#000;overflow:hidden}

/* Video visible centrado */
#video{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100%;height:100%;
  object-fit:cover;
  z-index:1;
}

/* Canvas ENCIMA del video para dibujar la máscara negra y el borde */
#maskCanvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  z-index:2;
  pointer-events:none;
}

canvas#captureCanvas{display:none;position:fixed}

.header{
  position:fixed;top:0;left:0;right:0;z-index:20;
  background:rgba(255,255,255,.96);backdrop-filter:blur(10px);
  border-bottom:2px solid var(--rojo);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:60px;
  box-shadow:0 2px 12px rgba(0,0,0,.12);
}
.hdr-logo{display:flex;align-items:center;gap:14px}
.hdr-logo img{height:40px;width:auto;object-fit:contain}
.hdr-div{width:1px;height:30px;background:var(--gris2);margin:0 4px}
.hdr-title strong{display:block;font-size:13px;font-weight:700;color:var(--texto)}
.hdr-title span{font-size:10px;color:var(--texto3);text-transform:uppercase;letter-spacing:.8px}
.hdr-right{display:flex;align-items:center;gap:14px}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.9);border:1px solid var(--gris2);border-radius:8px;padding:5px 12px}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--rojo);animation:bl 1s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
.live-txt{font-size:11.5px;font-weight:600;color:var(--texto)}
.clock{font-size:18px;font-weight:700;color:var(--texto);font-variant-numeric:tabular-nums}
.clock-d{font-size:10px;color:var(--texto3);text-align:right;margin-top:1px;text-transform:capitalize}

.cam-hint{
  position:fixed;bottom:0;left:0;right:0;z-index:15;
  padding:14px;text-align:center;font-size:14px;font-weight:600;color:#fff;
  transition:background .4s;
}
.cam-hint.normal{background:rgba(0,0,0,.65)}
.cam-hint.buscando{background:rgba(220,38,38,.88)}
.cam-hint.ok{background:rgba(22,163,74,.9)}
.cam-hint.err{background:rgba(153,27,27,.9)}

.result-overlay{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);}
.result-overlay.show{display:flex}
.result-card{background:var(--blanco);border-radius:20px;padding:36px 32px;width:520px;max-width:92vw;box-shadow:0 24px 64px rgba(0,0,0,.4);text-align:center;animation:popIn .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.card-badge-ok{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1.5px solid #bbf7d0;border-radius:14px;padding:24px 20px 18px;margin-bottom:18px;display:flex;flex-direction:column;align-items:center}
.card-badge-err{background:linear-gradient(135deg,#fef2f2,#fee2e2);border:1.5px solid #fecaca;border-radius:14px;padding:24px 20px 18px;margin-bottom:18px;display:flex;flex-direction:column;align-items:center}
.r-photo{width:160px;height:160px;border-radius:50%;object-fit:cover;border:4px solid var(--blanco);box-shadow:0 6px 24px rgba(0,0,0,.2);display:none;margin:0 auto 12px}
.r-ph{width:160px;height:160px;border-radius:50%;background:var(--gris2);border:4px solid var(--blanco);display:flex;align-items:center;justify-content:center;font-size:64px;margin:0 auto 12px}
.r-ph.err-ph{background:#fee2e2}
.estado-badge{display:inline-flex;align-items:center;gap:6px;padding:7px 22px;border-radius:99px;font-size:13px;font-weight:700;margin-bottom:10px}
.estado-badge.ok{background:var(--verde);color:#fff}
.estado-badge.err{background:var(--rojo);color:#fff}
.r-nombre{font-size:22px;font-weight:800;color:var(--texto)}
.r-datos{background:var(--gris);border-radius:10px;padding:14px 18px;text-align:left;margin-bottom:16px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--gris2);font-size:14px}
.drow:last-child{border-bottom:none}
.dkey{color:var(--texto3);font-weight:500}.dval{font-weight:700;color:var(--texto)}
.countdown-bar{height:4px;background:var(--gris2);border-radius:99px;overflow:hidden;margin-bottom:6px}
.countdown-fill{height:100%;border-radius:99px;transition:width 1s linear}
.countdown-fill.ok{background:var(--verde)}.countdown-fill.err{background:var(--rojo)}
.countdown-txt{font-size:11px;color:var(--texto3);text-align:center}
.freg{position:fixed;bottom:12px;right:20px;z-index:16;font-size:11px;color:rgba(255,255,255,.8);text-decoration:none;font-weight:500;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);border-radius:99px;padding:5px 14px;}
</style>
</head>

  <div class="result-card">
    <div id="card-badge">
      <div class="r-ph" id="r-ph">👤</div>
      <img class="r-photo" id="r-photo" src="" alt="">

      <div class="drow"><span class="dkey">Carrera</span><span class="dval" id="r-car">—</span></div>

</div>

<a href="registro.html" class="freg">¿Primera vez? Regístrese aquí →</a>

<script>
const API='http://127.0.0.1:8000';
let procesando=false,cooldown=false;
let borderColor='#dc2626';

const mc=document.getElementById('maskCanvas');
const mctx=mc.getContext('2d');

function resize(){
  mc.width=window.innerWidth;
  mc.height=window.innerHeight;
  drawMask();
}
window.addEventListener('resize',resize);

function drawMask(){
  const W=mc.width,H=mc.height;
  const cx=W/2,cy=H/2+20;
  const rx=W*0.28,ry=H*0.42;

  mctx.clearRect(0,0,W,H);

  // Fondo negro con hueco oval usando fillRule evenodd
  mctx.beginPath();
  mctx.rect(0,0,W,H);
  mctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  mctx.fillStyle='#000';
  mctx.fill('evenodd');

  // Borde oval
  mctx.beginPath();
  mctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  mctx.strokeStyle=borderColor;
  mctx.lineWidth=3;
  mctx.stroke();
}

// Animar borde
setInterval(()=>{
  if(!cooldown) drawMask();
},50);

setInterval(()=>{
  const n=new Date();
  g('clock').textContent=n.toLocaleTimeString('es-PE',{hour12:false});
  g('clock-d').textContent=n.toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
},1000);

async function iniciarCamara(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{width:{ideal:1280},height:{ideal:720},facingMode:'user'}
    });
    g('video').srcObject=stream;
    resize();
    setInterval(async()=>{if(!procesando&&!cooldown)await verificar();},3000);
  }catch(e){
    hint('err','⚠ Sin acceso a la cámara — verifique los permisos');
  }
}

async function verificar(){
  procesando=true;
  hint('buscando','Verificando identidad...');
  try{
    const v=g('video');
    const cap=g('captureCanvas');
    cap.width=v.videoWidth||1280;cap.height=v.videoHeight||720;
    cap.getContext('2d').drawImage(v,0,0);
    const blob=await new Promise(r=>cap.toBlob(r,'image/jpeg',0.9));
    const form=new FormData();form.append('foto',blob,'frame.jpg');
    const res=await fetch(API+'/verificar',{method:'POST',body:form});
    if(!res.ok){resetear();procesando=false;return;}
    const data=await res.json();
    if(data.resultado==='concedido')mostrarOk(data);
    else if(data.resultado==='desconocido')mostrarErr();
    else resetear();
  }catch(e){resetear();}
  procesando=false;
}

function mostrarOk(d){
  borderColor='#16a34a';drawMask();
  hint('ok','✓ Identidad verificada — Acceso concedido');
  const p=(d.nombre||'').split(' '),m=Math.ceil(p.length/2);
  const nom=p.slice(0,m).join(' '),ape=p.slice(m).join(' ');
  g('card-badge').className='card-badge-ok';
  g('estado-badge').className='estado-badge ok';g('estado-badge').textContent='✓ Acceso Concedido';
  g('r-nombre').textContent=nom||d.nombre||'—';
  g('r-ap').textContent=ape||'—';g('r-cod').textContent=d.codigo||'—';
  g('r-car').textContent=d.carrera||'—';
  g('r-hora').textContent=new Date().toLocaleTimeString('es-PE',{hour12:false});
  g('r-datos').style.display='block';g('cd-fill').className='cd-fill ok';
  if(d.estudiante_id){
    const img=g('r-photo'),ph=g('r-ph');
    img.src=API+'/foto/'+d.estudiante_id+'?t='+Date.now();
    img.onload=()=>{img.style.display='block';ph.style.display='none';};
    img.onerror=()=>{img.style.display='none';ph.style.display='flex';};
  }
  mostrarOverlay(5);
}

function mostrarErr(){
  borderColor='#dc2626';drawMask();
  hint('err','✗ Acceso denegado — No es estudiante registrado');
  g('card-badge').className='card-badge-err';
  g('r-ph').className='r-ph err-ph';g('r-ph').textContent='⛔';
  g('r-ph').style.display='flex';g('r-photo').style.display='none';
  g('estado-badge').className='estado-badge err';g('estado-badge').textContent='✗ Acceso Denegado';
  g('r-nombre').textContent='No es estudiante registrado';
  g('r-datos').style.display='none';g('cd-fill').className='cd-fill err';
  mostrarOverlay(3);
}

function mostrarOverlay(seg){
  cooldown=true;
  g('result-overlay').classList.add('show');
  g('cd-fill').style.transition='none';g('cd-fill').style.width='100%';
  g('cd-txt').textContent=`Cerrando en ${seg} segundos...`;
  setTimeout(()=>{g('cd-fill').style.transition=`width ${seg}s linear`;g('cd-fill').style.width='0%';},50);
  let s=seg;
  const iv=setInterval(()=>{
    s--;g('cd-txt').textContent=`Cerrando en ${s} segundo${s!==1?'s':''}...`;
    if(s<=0){clearInterval(iv);cerrarOverlay();}
  },1000);
}

function cerrarOverlay(){
  g('result-overlay').classList.remove('show');
  g('r-ph').className='r-ph';g('r-ph').textContent='👤';
  g('r-ph').style.display='flex';g('r-photo').style.display='none';
  g('r-datos').style.display='block';
  cooldown=false;borderColor='#dc2626';
  resetear();
}

function hint(tipo,txt){const h=g('cam-hint');h.className='cam-hint '+tipo;h.textContent=txt;}
function resetear(){borderColor='#dc2626';drawMask();hint('normal','Ubique su rostro dentro del óvalo');}
function g(id){return document.getElementById(id)}

iniciarCamara();
</script>
